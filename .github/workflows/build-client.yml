name: Build HeavenClient (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout HeavenClient source
      uses: actions/checkout@v4
      with:
        repository: ryantpayton/MapleStory-Client
        path: client

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Patch source files for MSVC v143 compatibility
      shell: pwsh
      working-directory: client
      run: |
        # Fix 1: EnumMap.h missing #include <stdexcept>
        $file = "Template/EnumMap.h"
        $content = Get-Content $file -Raw
        $content = $content -replace '#pragma once', "#pragma once`r`n#include <stdexcept>"
        Set-Content $file $content -Encoding UTF8 -NoNewline

        # Fix 2: DrawArgument.h narrowing int->int16_t in return initializer list
        $file = "Graphics/DrawArgument.h"
        $content = Get-Content $file -Raw
        $content = $content.Replace(
          'cx + static_cast<int16_t>(xscale * rl)',
          'static_cast<int16_t>(cx + static_cast<int16_t>(xscale * rl))')
        $content = $content.Replace(
          'cx + static_cast<int16_t>(xscale * rr)',
          'static_cast<int16_t>(cx + static_cast<int16_t>(xscale * rr))')
        $content = $content.Replace(
          'cy + static_cast<int16_t>(yscale * rt)',
          'static_cast<int16_t>(cy + static_cast<int16_t>(yscale * rt))')
        $content = $content.Replace(
          'cy + static_cast<int16_t>(yscale * rb)',
          'static_cast<int16_t>(cy + static_cast<int16_t>(yscale * rb))')
        Set-Content $file $content -Encoding UTF8 -NoNewline

    - name: Build HeavenClient
      shell: pwsh
      working-directory: client
      run: |
        msbuild MapleStory.sln `
          /p:Configuration=Release /p:Platform=x64 `
          /p:PlatformToolset=v143 `
          /p:WindowsTargetPlatformVersion=10.0 `
          /v:m /m

    - name: Collect release files
      shell: pwsh
      working-directory: client
      run: |
        New-Item -Force -ItemType Directory release | Out-Null
        Copy-Item x64/Release/MapleStory.exe release/
        Copy-Item includes/bass24/bass.dll release/ -ErrorAction SilentlyContinue
        Copy-Item "includes/glew-2.1.0/bin/Release/x64/glew32.dll" release/ -ErrorAction SilentlyContinue
        "ServerIP = 192.168.31.170`nServerPort = 8484" | Out-File -Encoding utf8 release/Settings

    - name: Upload HeavenClient artifact
      uses: actions/upload-artifact@v4
      with:
        name: HeavenClient-v83
        path: client/release/
        retention-days: 14
