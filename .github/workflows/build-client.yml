name: Build HeavenClient (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout HeavenClient source
      uses: actions/checkout@v4
      with:
        repository: ryantpayton/MapleStory-Client
        path: client

    - name: Install v140 toolset
      shell: pwsh
      run: |
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = (& $vsWhere -latest -products * -property installationPath).Trim()
        Write-Host "VS path: $vsPath"
        $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
        $proc = Start-Process -FilePath $installer -ArgumentList @(
          "modify",
          "--installPath", $vsPath,
          "--add", "Microsoft.VisualStudio.Component.VC.140",
          "--quiet", "--norestart", "--force"
        ) -Wait -PassThru -NoNewWindow
        Write-Host "Exit code: $($proc.ExitCode)"
        if ($proc.ExitCode -notin @(0, 3010)) {
          Write-Error "v140 install failed with exit code $($proc.ExitCode)"
          exit 1
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build HeavenClient
      shell: pwsh
      working-directory: client
      run: |
        msbuild MapleStory.sln `
          /p:Configuration=Release /p:Platform=x64 `
          /p:PlatformToolset=v140 `
          /p:WindowsTargetPlatformVersion=10.0 `
          /v:m /m

    - name: Collect release files
      shell: pwsh
      working-directory: client
      run: |
        New-Item -Force -ItemType Directory release | Out-Null
        Copy-Item x64/Release/MapleStory.exe release/
        Copy-Item includes/bass24/bass.dll release/ -ErrorAction SilentlyContinue
        Copy-Item "includes/glew-2.1.0/bin/Release/x64/glew32.dll" release/ -ErrorAction SilentlyContinue
        "ServerIP = 192.168.31.170`nServerPort = 8484" | Out-File -Encoding utf8 release/Settings

    - name: Upload HeavenClient artifact
      uses: actions/upload-artifact@v4
      with:
        name: HeavenClient-v83
        path: client/release/
        retention-days: 14
